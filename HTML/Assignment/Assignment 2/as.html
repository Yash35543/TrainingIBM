<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Forms</title>
</head>
<body>
  <h1>FORMS</h1>

  Name <input type="text" placeholder="Name" /><br><br>

  Email-id <input type="email" placeholder="Email-id" /><br><br>

  Password <input type="password" placeholder="Password" /><br><br>

  Language<br>
  <input type="radio" name="language" value="html" /> HTML<br>
  <input type="radio" name="language" value="css" /> CSS<br>
  <input type="radio" name="language" value="js" /> JS<br><br>

  Course<br>
  <input type="checkbox" name="course" value="java" /> Java Stack<br>
  <input type="checkbox" name="course" value="ds" /> Data Science<br>
  <input type="checkbox" name="course" value="mern" /> Mern Stack<br><br>

  Field:
  <select name="field">
    <option value="">Select</option>
    <option value="frontend">Frontend</option>
    <option value="backend">Backend</option>
    <option value="fullstack">Full Stack</option>
  </select><br><br>

  <textarea placeholder="Describe yourself"></textarea><br><br>

  Date<br>
  <input type="date" /><br><br>

  Phone No. <input type="tel" placeholder="Phone NO." /><br><br>

  <input type="submit" value="submit" /><br>
  <a href="aw.html">CliCK Here For table Page</a>
</body>
</html>
